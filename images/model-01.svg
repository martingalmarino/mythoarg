<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="MYTHO Alba — anteojos de sol oval">
  <defs>
    <!-- Lens gradient: dark tinted, slight depth -->
    <radialGradient id="a-lens" cx="36%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#26263A"/>
      <stop offset="100%" stop-color="#0A0A10"/>
    </radialGradient>
    <!-- Frame gradient: top lighter, edge darker -->
    <linearGradient id="a-frame" x1="0" y1="0" x2="0.1" y2="1">
      <stop offset="0%"   stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="a-sh" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="blur"/>
      <feOffset dx="0" dy="10" result="offset"/>
      <feFlood flood-color="#000000" flood-opacity="0.18" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Subtle floor reflection gradient -->
    <linearGradient id="a-refl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0A0A10" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0A0A10" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background — brand off-white -->
  <rect width="800" height="600" fill="#F7F5F2"/>

  <!-- Subtle floor line -->
  <rect x="0" y="408" width="800" height="40" fill="url(#a-refl)"/>

  <!-- ── EYEGLASSES GROUP ── -->
  <g filter="url(#a-sh)">

    <!-- ══ LEFT OVAL FRAME ══ -->
    <!-- Outer frame -->
    <ellipse cx="262" cy="295" rx="116" ry="84" fill="url(#a-frame)"/>
    <!-- Lens -->
    <ellipse cx="262" cy="295" rx="104" ry="72" fill="url(#a-lens)"/>
    <!-- Specular highlight top-left -->
    <ellipse cx="232" cy="268" rx="26" ry="14" fill="rgba(255,255,255,0.09)" transform="rotate(-22 232 268)"/>
    <!-- Micro bottom reflection -->
    <ellipse cx="262" cy="348" rx="68" ry="8" fill="rgba(255,255,255,0.04)"/>

    <!-- ══ RIGHT OVAL FRAME ══ -->
    <ellipse cx="538" cy="295" rx="116" ry="84" fill="url(#a-frame)"/>
    <ellipse cx="538" cy="295" rx="104" ry="72" fill="url(#a-lens)"/>
    <ellipse cx="508" cy="268" rx="26" ry="14" fill="rgba(255,255,255,0.09)" transform="rotate(-22 508 268)"/>
    <ellipse cx="538" cy="348" rx="68" ry="8" fill="rgba(255,255,255,0.04)"/>

    <!-- ══ BRIDGE ══ -->
    <path d="M 378 289 C 375 276 388 270 400 270 C 412 270 425 276 422 289"
          stroke="#090909" stroke-width="10" stroke-linecap="round" fill="none"/>

    <!-- Nose pads -->
    <ellipse cx="382" cy="301" rx="4" ry="5.5" fill="#050505" opacity="0.55"/>
    <ellipse cx="418" cy="301" rx="4" ry="5.5" fill="#050505" opacity="0.55"/>

    <!-- ══ LEFT TEMPLE ══ -->
    <path d="M 146 284 C 95 287 55 290 18 298"
          stroke="#0a0a0a" stroke-width="10" stroke-linecap="round" fill="none"/>

    <!-- ══ RIGHT TEMPLE ══ -->
    <path d="M 654 284 C 705 287 745 290 782 298"
          stroke="#0a0a0a" stroke-width="10" stroke-linecap="round" fill="none"/>

  </g>

  <!-- Model name — brand watermark style -->
  <text x="400" y="552"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-size="9.5" font-weight="300" letter-spacing="8"
    text-anchor="middle" fill="#BDB9B2">MYTHO ALBA</text>
</svg>
